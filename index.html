    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --bg:           #0d0d1b;
      --surface:      #12122a;
      --card:         #181832;
      --card-hover:   #1e1e3d;
      --border:       rgba(255,255,255,0.07);
      --accent:       #7c6ff7;
      --accent-glow:  rgba(124,111,247,0.25);
      --accent-light: #a78bfa;
      --success:      #10b981;
      --success-bg:   rgba(16,185,129,0.15);
      --danger:       #ef4444;
      --danger-bg:    rgba(239,68,68,0.15);
      --text:         #e2e8f0;
      --text-dim:     #94a3b8;
      --text-muted:   #64748b;
      --radius:       14px;
      --radius-sm:    8px;
      --shadow:       0 12px 40px rgba(0,0,0,0.55);
      --shadow-sm:    0 4px 16px rgba(0,0,0,0.35);
      --transition:   0.22s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── Base ───────────────────────────────────────────────── */
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Tahoma', 'Arial', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    a { color: var(--accent-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Layout ─────────────────────────────────────────────── */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 48px;
      width: 100%;
    }
    .container {
      width: 100%;
      max-width: 760px;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 18px;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    footer strong { color: var(--text-dim); }
    footer a {
      color: var(--accent-light);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    footer a:hover { color: #fff; }

    /* ─── Progress Bar ───────────────────────────────────────── */
    .progress-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 12px 0 0;
      width: 100%;
      max-width: 760px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      direction: ltr;
    }
    .progress-bar-outer {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── Landing Screen ─────────────────────────────────────── */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      gap: 24px;
      animation: fadeUp 0.5s ease both;
    }
    .landing-icon {
      font-size: 72px;
      filter: drop-shadow(0 0 24px var(--accent-glow));
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .landing h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .landing p {
      font-size: 1.05rem;
      color: var(--text-dim);
      max-width: 440px;
    }
    .stat-pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .stat-pill span { color: var(--accent-light); font-weight: 700; }

    /* ─── Quiz Mode Cards ────────────────────────────────────── */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 680px;
    }
    .mode-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 18px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .mode-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow);

    .mode-card-1:hover { background: rgba(16,185,129,0.08); box-shadow: 0 8px 30px rgba(16,185,129,0.2); }
    .mode-card-2 { border-color: #7c6ff7; }
    .mode-card-2:hover { background: rgba(124,111,247,0.08); box-shadow: 0 8px 30px rgba(124,111,247,0.25); }
    .mode-card-3 { border-color: #f59e0b; }
    .mode-card-3:hover { background: rgba(245,158,11,0.08); box-shadow: 0 8px 30px rgba(245,158,11,0.2); }
    .mode-icon { font-size: 2.4rem; }
    .mode-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .mode-count { font-size: 2rem; font-weight: 900; line-height: 1; }
    .mode-card-1 .mode-count { color: #10b981; }
    .mode-card-2 .mode-count { color: #a78bfa; }
    .mode-card-3 .mode-count { color: #f59e0b; }
    .mode-qs { font-size: 0.78rem; color: var(--text-muted); }
    .mode-time { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    @media (max-width: 520px) {
      .mode-grid { grid-template-columns: 1fr; max-width: 320px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      transition: var(--transition);

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b4fcf);

    .btn-ghost {

      color: var(--text-dim);
    }
    .btn-ghost:hover { background: var(--card); color: var(--text); }

    .question-card {

      border-radius: var(--radius);
      padding: 28px 28px 24px;
      margin: 20px 0 24px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.35s ease both;
    }
    .question-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.4px;
    }
    .question-text {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.7;
    }

    /* ─── Options Grid ───────────────────────────────────────── */
    .options-grid {
      display: grid;
      gap: 12px;
    }
    .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .options-grid.cols-1 { grid-template-columns: 1fr; }
    .option-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-dim);
      text-align: right;
      transition: var(--transition);
      animation: fadeUp 0.3s ease both;
      position: relative;
      overflow: hidden;
    }
    .option-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-glow), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .option-card:hover:not(.disabled) {
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .option-card:hover:not(.disabled)::before { opacity: 1; }
    .option-card.correct {
      background: var(--success-bg);
      border-color: var(--success);
      color: #fff;
    }
    .option-card.wrong {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: #fff;
    }
    .option-card.disabled { cursor: default; }
    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .option-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .correct .option-icon, .wrong .option-icon { opacity: 1; }

    .option-card:nth-child(1) { animation-delay: 0.05s; }
    .option-card:nth-child(2) { animation-delay: 0.1s; }
    .option-card:nth-child(3) { animation-delay: 0.15s; }
    .option-card:nth-child(4) { animation-delay: 0.2s; }

    /* ─── Results Screen ─────────────────────────────────────── */
    .results {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 16px 60px;
      gap: 28px;
      animation: fadeUp 0.5s ease both;
    }
    .score-ring {
      position: relative;
      width: 160px;
      height: 160px;
    }
    .score-ring svg {
      transform: rotate(-90deg);
      direction: ltr;
    }
    .score-ring .ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 10; }
    .score-ring .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-grade { font-size: 2.2rem; }
    .score-pct { font-size: 1.6rem; font-weight: 800; color: var(--text); direction: ltr; }
    .score-label { font-size: 0.75rem; color: var(--text-muted); }
    .results h2 {

      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .score-detail {
      font-size: 1rem;
      color: var(--text-dim);
    }
    .score-detail strong { color: var(--text); font-size: 1.1rem; }
    .results-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ─── Utility Animations ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop 0.3s ease; }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 520px) {
      .question-card { padding: 18px 16px; }
      .options-grid.cols-2 { grid-template-columns: 1fr; }
      .results-btns { flex-direction: column; }
    }

    .cat-byzantine { background: rgba(236,72,153,0.15); color: #f472b6; border: 1px solid rgba(244,114,182,0.3); }
    .cat-gothic    { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);

      border-radius: 99px;
      font-size: 0.88rem;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;

      white-space: nowrap;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

// ── Fisher-Yates shuffle ───────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Prepare questions (shuffle, slice to count, shuffle options) ───
function prepareQuestions(count) {
  let qs = shuffle(QUESTIONS).slice(0, count);
  if (CONFIG.shuffleOptions) {
    qs = qs.map(q => {
      const correctText = q.options[q.correct];
      const shuffledOpts = shuffle(q.options);
      return { ...q, options: shuffledOpts, correct: shuffledOpts.indexOf(correctText) };
    });
  }
  return qs;
}

// ── Sound effects via Web Audio API ───────────────────────────────
function playSound(correct) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    if (correct) {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.24);
    } else {
      osc.frequency.setValueAtTime(330, ctx.currentTime);
      osc.frequency.setValueAtTime(277, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(220, ctx.currentTime + 0.3);
    }
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.45);
  } catch (_) { /* Audio not available */ }
}

// ── Toast notification ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ── Grade helper ───────────────────────────────────────────────────
function getGrade(pct) {
  if (pct >= 90) return { emoji: "🏆", text: "ممتاز!", color: "#10b981" };
  if (pct >= 80) return { emoji: "🌟", text: "جيد جدًا",  color: "#3b82f6" };
  if (pct >= 70) return { emoji: "👍", text: "جيد",       color: "#8b5cf6" };
  if (pct >= 60) return { emoji: "✅", text: "مقبول",      color: "#f59e0b" };
  return { emoji: "📚", text: "راجع المادة", color: "#ef4444" };
}

        <div class="stat-pills">
          <div class="stat-pill">البنك الكلي <span>${QUESTIONS.length}</span> سؤال</div>
          <div class="stat-pill">نسبة النجاح <span>${CONFIG.passingScore}%</span></div>
        </div>
      </div>
    </div>`;

  document.querySelectorAll(".mode-card").forEach(card => {
    card.addEventListener("click", () => startQuiz(parseInt(card.dataset.count)));
  });
}

// ── Start quiz ─────────────────────────────────────────────────────
function startQuiz(count) {
  const n = count || state.modeCount;
  state.modeCount = n;
  state.questions = prepareQuestions(n);
  state.currentIdx = 0;
  state.score = 0;
  state.answered = false;
  state.screen = "quiz";
  render();
}

// ── Quiz screen ────────────────────────────────────────────────────
function renderQuiz() {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  const pct = Math.round((state.currentIdx / total) * 100);
  const isTrueFalse = q.options.length === 2;
  const gridClass = isTrueFalse ? "cols-2" : "cols-1";

  const catCls  = CAT_CLASS[q.category] || "cat-general";
  const catIcon = CAT_ICON[q.category]  || "📚";

  app.innerHTML = `
    <div class="container">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>${state.currentIdx + 1} / ${total}</span>
          <span>النتيجة: ${state.score}</span>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="pbar" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="question-screen">
        <div class="question-card">
          <div class="question-header">
            <div class="category-badge ${catCls}">${catIcon} ${q.category}</div>
            <span style="color:var(--text-muted);font-size:0.8rem">سؤال ${state.currentIdx + 1}</span>
          </div>
          <p class="question-text">${q.question}</p>
        </div>

        <div class="options-grid ${gridClass}" id="optionsGrid">
          ${q.options.map((opt, i) => `
            <div class="option-card" data-idx="${i}" style="animation-delay:${0.05 + i * 0.06}s">
              <div class="option-label">
                <span class="option-icon" id="icon-${i}"></span>
                <span>${opt}</span>
              </div>
            </div>`).join("")}
        </div>
      </div>
    </div>`;

  // Attach click handlers
  document.querySelectorAll(".option-card").forEach(card => {
    card.addEventListener("click", () => onAnswer(parseInt(card.dataset.idx)));
  });
}

// ── Handle answer ──────────────────────────────────────────────────
function onAnswer(selectedIdx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.currentIdx];
  const isCorrect = selectedIdx === q.correct;
  if (isCorrect) state.score++;

  playSound(isCorrect);

  // Style all cards
  document.querySelectorAll(".option-card").forEach((card, i) => {
    card.classList.add("disabled");
    const icon = document.getElementById(`icon-${i}`);
    if (i === q.correct) {
      card.classList.add("correct");
      if (icon) icon.textContent = "✓";
    } else if (i === selectedIdx && !isCorrect) {
      card.classList.add("wrong");
      card.classList.add("shake");
      if (icon) icon.textContent = "✗";
    }
  });

  // If correct, pop animation on correct card
  if (isCorrect) {
    document.querySelectorAll(".option-card")[selectedIdx]?.classList.add("pop");
  }

  // Auto-advance
  setTimeout(() => {
    state.answered = false;
    state.currentIdx++;
    if (state.currentIdx >= state.questions.length) {
      state.screen = "results";
    }
    render();
  }, CONFIG.autoAdvanceDelay);
}

// ── Results screen ─────────────────────────────────────────────────
function renderResults() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  const grade = getGrade(pct);
  const circumference = 2 * Math.PI * 54; // radius 54

  app.innerHTML = `
    <div class="container">
      <div class="results">
        <div class="score-ring">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle class="ring-bg"   cx="80" cy="80" r="54"/>
            <circle class="ring-fill" cx="80" cy="80" r="54"
              stroke="${grade.color}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"
              id="ringFill"/>
          </svg>
          <div class="score-center">
            <span class="score-grade">${grade.emoji}</span>
            <span class="score-pct" id="scorePct">0%</span>
            <span class="score-label">${grade.text}</span>
          </div>
        </div>

        <h2>انتهى الاختبار!</h2>
        <p class="score-detail">
          أجبت إجابةً صحيحة على <strong>${state.score}</strong> من أصل <strong>${total}</strong> سؤال.
        </p>

        <div class="results-btns">
          <button class="btn btn-primary" id="retakeBtn">🔄 إعادة الاختبار</button>
          <button class="btn btn-secondary" id="shareBtn">📤 مشاركة النتيجة</button>
          <button class="btn btn-ghost" id="homeBtn">🏠 الرئيسية</button>
        </div>
      </div>
    </div>`;

  document.getElementById("retakeBtn").onclick = () => startQuiz(state.modeCount);
  document.getElementById("homeBtn").onclick = () => { state.screen = "landing"; render(); };
  document.getElementById("shareBtn").onclick = () => {
    const txt = `حصلت على ${state.score}/${total} (${pct}%) في ${CONFIG.title}! ${grade.emoji}`;
    navigator.clipboard?.writeText(txt)
      .then(() => showToast("✅ تم نسخ النتيجة!"))
      .catch(() => showToast("تعذّر النسخ. النتيجة: " + txt));
  };

  // Animate ring
  setTimeout(() => {
    const fill = document.getElementById("ringFill");
    const offset = circumference - (pct / 100) * circumference;
    if (fill) fill.style.strokeDashoffset = offset;
  }, 100);

  // Animate percentage counter
  animateCounter("scorePct", 0, pct, 1400, v => v + "%");
}

// ── Counter animation ──────────────────────────────────────────────
function animateCounter(id, from, to, duration, fmt) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease-out-cubic
    el.textContent = fmt(Math.round(from + (to - from) * ease));
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── Kick things off ─────────────────────────────────────────────── */
render();
</script>
</body>
</html>
