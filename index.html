<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History Quiz — by Musab</title>
  <style>
    /* ─── Design Tokens ──────────────────────────────────────────── */
    :root {
      --bg:          #1e1e1e;
      --surface:     #252526;
      --surface2:    #2d2d30;
      --border:      #3e3e42;
      --accent:      #007acc;
      --accent-glow: rgba(0,122,204,0.25);
      --correct:     #23d160;
      --correct-bg:  rgba(35,209,96,0.15);
      --wrong:       #ff3860;
      --wrong-bg:    rgba(255,56,96,0.15);
      --text:        #d4d4d4;
      --text-dim:    #858585;
      --text-bright: #ffffff;
      --radius:      12px;
      --radius-sm:   8px;
      --transition:  0.25s cubic-bezier(.4,0,.2,1);
    }

    /* ─── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 80px;
    }

    /* ─── Screen Wrapper ─────────────────────────────────────────── */
    .screen {
      width: 100%;
      max-width: 720px;
      display: none;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity var(--transition), transform var(--transition);
    }
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    .screen.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── Landing ────────────────────────────────────────────────── */
    #landing {
      align-items: center;
      text-align: center;
      padding-top: clamp(40px, 8vh, 100px);
      gap: 28px;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #1a6fa8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 32px var(--accent-glow);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .landing-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.5px;
    }

    .landing-subtitle {
      font-size: 1rem;
      color: var(--text-dim);
      max-width: 400px;
      line-height: 1.6;
    }

    .question-count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 0.85rem;
      color: var(--text-dim);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .question-count-badge span { color: var(--accent); font-weight: 600; }

    .categories-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
    }

    /* ─── Buttons ────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 36px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter var(--transition), transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
      font-size: 1.05rem;
      padding: 16px 48px;
    }
    .btn-primary:hover {
      filter: brightness(1.12);
      box-shadow: 0 6px 28px rgba(0,122,204,0.4);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    .btn-share {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 10px 24px;
    }
    .btn-share:hover { background: var(--accent-glow); }

    /* ─── Quiz Screen ────────────────────────────────────────────── */
    #quiz { gap: 0; }

    /* Progress */
    .progress-bar-wrap {
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #23d160);
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* Quiz Header */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .question-counter {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    .category-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(0,122,204,0.3);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* Question Card */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(20px, 4vw, 36px);
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .question-text {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 500;
      color: var(--text-bright);
      line-height: 1.65;
    }

    /* Options */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 520px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    .option-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      cursor: pointer;
      transition:
        background var(--transition),
        border-color var(--transition),
        transform 0.15s ease,
        box-shadow var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.4;
      position: relative;
      overflow: hidden;
    }
    .option-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .option-card:hover:not(.disabled) {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .option-card.disabled { cursor: default; pointer-events: none; }

    .option-letter {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dim);
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .option-card.correct {
      background: var(--correct-bg);
      border-color: var(--correct);
      animation: correctPulse 0.4s ease;
    }
    .option-card.correct .option-letter {
      background: var(--correct);
      border-color: var(--correct);
      color: #fff;
    }
    .option-card.wrong {
      background: var(--wrong-bg);
      border-color: var(--wrong);
      animation: wrongShake 0.4s ease;
    }
    .option-card.wrong .option-letter {
      background: var(--wrong);
      border-color: var(--wrong);
      color: #fff;
    }

    @keyframes correctPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    /* Next button (manual mode) */
    .quiz-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    /* ─── Results Screen ─────────────────────────────────────────── */
    #results {
      align-items: center;
      text-align: center;
      padding-top: clamp(30px, 6vh, 80px);
      gap: 24px;
    }

    .results-emoji {
      font-size: 4rem;
      animation: popIn 0.5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .results-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text-bright);
    }

    .score-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 48px;
      min-width: 240px;
    }
    .score-fraction {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      color: var(--text-bright);
      letter-spacing: -1px;
    }
    .score-fraction span { color: var(--accent); }
    .score-percent {
      font-size: 1.1rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .grade-bar {
      width: 100%;
      max-width: 400px;
    }
    .grade-bar-track {
      width: 100%;
      height: 8px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }
    .grade-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
      background: linear-gradient(90deg, var(--accent), #23d160);
    }
    .grade-label {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .results-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .copied-toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Footer ─────────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
      z-index: 100;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    footer a:hover { text-decoration: underline; }

    /* ─── Category Badge Colors ──────────────────────────────────── */
    .cat-byzantine  { background: rgba(175,99,245,0.15); color: #bf7fff; border-color: rgba(175,99,245,0.3); }
    .cat-egyptian   { background: rgba(245,176,65,0.15); color: #f5b041; border-color: rgba(245,176,65,0.3); }
    .cat-greek      { background: rgba(52,152,219,0.15); color: #5dade2; border-color: rgba(52,152,219,0.3); }
    .cat-roman      { background: rgba(231,76,60,0.15);  color: #e74c3c; border-color: rgba(231,76,60,0.3); }
    .cat-medieval   { background: rgba(39,174,96,0.15);  color: #2ecc71; border-color: rgba(39,174,96,0.3); }
    .cat-ottoman    { background: rgba(230,126,34,0.15); color: #e67e22; border-color: rgba(230,126,34,0.3); }
    .cat-islamic    { background: rgba(26,188,156,0.15); color: #1abc9c; border-color: rgba(26,188,156,0.3); }
    .cat-general    { background: rgba(52,73,94,0.4);    color: #95a5a6; border-color: rgba(149,165,166,0.3); }
  </style>
</head>

/* ═══════════════════════════════════════════════════════════════════════
   APP STATE & UTILITIES
═══════════════════════════════════════════════════════════════════════ */
let shuffledQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let advanceTimer = null;

// Shuffle array in place (Fisher-Yates)
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Category → CSS class
function catClass(cat) {
  const map = {
    Byzantine: 'cat-byzantine',
    Egyptian:  'cat-egyptian',
    Greek:     'cat-greek',
    Roman:     'cat-roman',
    Medieval:  'cat-medieval',
    Ottoman:   'cat-ottoman',
    Islamic:   'cat-islamic',
    General:   'cat-general',
  };
  return map[cat] || 'cat-general';
}

/* ═══════════════════════════════════════════════════════════════════════
   WEB AUDIO API — SOUND EFFECTS
═══════════════════════════════════════════════════════════════════════ */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone({ frequency = 440, type = 'sine', duration = 0.15, gainVal = 0.3 } = {}) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, ctx.currentTime);
    gain.gain.setValueAtTime(gainVal, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (_) { /* audio not available */ }
}

function playCorrect() {
  playTone({ frequency: 880, type: 'sine', duration: 0.18, gainVal: 0.25 });
  setTimeout(() => playTone({ frequency: 1100, type: 'sine', duration: 0.14, gainVal: 0.2 }), 100);
}

function playWrong() {
  playTone({ frequency: 280, type: 'sawtooth', duration: 0.22, gainVal: 0.2 });
}

/* ═══════════════════════════════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'visible');
  });
  const screen = document.getElementById(id);
  screen.classList.add('active');
  // Small delay so 'display:flex' is applied before transition
  requestAnimationFrame(() => {
    requestAnimationFrame(() => screen.classList.add('visible'));
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   LANDING PAGE
═══════════════════════════════════════════════════════════════════════ */
function initLanding() {
  document.getElementById('landing-title').textContent = CONFIG.quizTitle;
  document.getElementById('landing-subtitle').textContent = CONFIG.quizSubtitle;
  document.getElementById('total-count').textContent = QUESTIONS.length;

  // Unique categories
  const cats = [...new Set(QUESTIONS.map(q => q.category))];
  const preview = document.getElementById('categories-preview');
  preview.innerHTML = cats.map(c =>
    `<span class="category-badge ${catClass(c)}">${c}</span>`
  ).join('');

  showScreen('landing');
}

/* ═══════════════════════════════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════════════════════════════ */
function startQuiz() {
  shuffledQuestions = shuffle([...QUESTIONS]).map(q => {
    // Shuffle answer options while tracking the correct answer text
    const correctText = q.options[q.correct];
    const shuffledOpts = shuffle([...q.options]);
    return {
      ...q,
      options: shuffledOpts,
      correct: shuffledOpts.indexOf(correctText),
    };
  });
  currentIndex = 0;
  score = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  clearTimeout(advanceTimer);

  const q = shuffledQuestions[currentIndex];
  const total = shuffledQuestions.length;

  // Progress bar
  document.getElementById('progress-fill').style.width =
    `${(currentIndex / total) * 100}%`;

  // Counter & category
  document.getElementById('question-counter').textContent =
    `Question ${currentIndex + 1} of ${total}`;

  const badge = document.getElementById('category-badge');
  badge.textContent = q.category;
  badge.className = `category-badge ${catClass(q.category)}`;

  // Question text
  document.getElementById('question-text').textContent = q.question;

  // Options
  const LABELS = ['A', 'B', 'C', 'D'];
  const grid = document.getElementById('options-grid');
  grid.innerHTML = q.options.map((opt, i) => `
    <button class="option-card" data-index="${i}">
      <span class="option-letter">${LABELS[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  grid.querySelectorAll('.option-card').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.index)));
  });

  // Hide next button
  const footer = document.getElementById('quiz-footer');
  footer.style.display = 'none';
}

function handleAnswer(selectedIndex) {
  if (answered) return;
  answered = true;

  const q = shuffledQuestions[currentIndex];
  const cards = document.querySelectorAll('.option-card');

  // Disable all cards
  cards.forEach(c => c.classList.add('disabled'));

  if (selectedIndex === q.correct) {
    cards[selectedIndex].classList.add('correct');
    score++;
    playCorrect();
  } else {
    cards[selectedIndex].classList.add('wrong');
    cards[q.correct].classList.add('correct');
    playWrong();
  }

  // Advance
  if (CONFIG.manualAdvance) {
    const footer = document.getElementById('quiz-footer');
    footer.style.display = 'flex';
  } else {
    advanceTimer = setTimeout(advance, CONFIG.autoAdvanceDelay);
  }
}

function advance() {
  currentIndex++;
  if (currentIndex >= shuffledQuestions.length) {
    showResults();
  } else {
    // Slide-out effect on question card
    const card = document.querySelector('.question-card');
    const grid = document.getElementById('options-grid');
    [card, grid].forEach(el => {
      el.style.transition = 'opacity 0.2s, transform 0.2s';
      el.style.opacity = '0';
      el.style.transform = 'translateX(-20px)';
    });
    setTimeout(() => {
      [card, grid].forEach(el => {
        el.style.opacity = '';
        el.style.transform = '';
        el.style.transition = '';
      });
      renderQuestion();
    }, 200);
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   RESULTS SCREEN
═══════════════════════════════════════════════════════════════════════ */
function showResults() {
  const total = shuffledQuestions.length;
  const pct = Math.round((score / total) * 100);

  // Emoji & title
  let emoji, title;
  if (pct >= 90)      { emoji = '🏆'; title = 'Outstanding!'; }
  else if (pct >= 75) { emoji = '🎉'; title = 'Great job!'; }
  else if (pct >= CONFIG.passingThreshold) { emoji = '👍'; title = 'Well done!'; }
  else if (pct >= 40) { emoji = '📚'; title = 'Keep studying!'; }
  else                { emoji = '💪'; title = 'Don\'t give up!'; }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('score-total').textContent = total;
  document.getElementById('score-percent').textContent = `${pct}%`;
  document.getElementById('grade-label').textContent = `${pct}% correct`;
  document.getElementById('score-num').textContent = '0';

  // Update progress bar to 100% then hide it
  document.getElementById('progress-fill').style.width = '100%';

  showScreen('results');

  // Animate score counter
  let current = 0;
  const step = Math.max(1, Math.ceil(score / 40));
  const interval = setInterval(() => {
    current = Math.min(current + step, score);
    document.getElementById('score-num').textContent = current;
    if (current >= score) clearInterval(interval);
  }, 35);

  // Animate grade bar
  setTimeout(() => {
    document.getElementById('grade-bar-fill').style.width = `${pct}%`;
  }, 100);
}

/* ═══════════════════════════════════════════════════════════════════════
   SHARE SCORE
═══════════════════════════════════════════════════════════════════════ */
function shareScore() {
  const total = shuffledQuestions.length;
  const pct = Math.round((score / total) * 100);
  let emoji = pct >= 90 ? '🏆' : pct >= 75 ? '🎉' : pct >= 60 ? '👍' : '📚';
  const text = `I scored ${score}/${total} (${pct}%) on ${CONFIG.quizTitle}! ${emoji}`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed';
  el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  showToast();
}

function showToast() {
  const toast = document.getElementById('copied-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════════════════════════════════
   EVENT LISTENERS & INIT
═══════════════════════════════════════════════════════════════════════ */
document.getElementById('start-btn').addEventListener('click', startQuiz);
document.getElementById('next-btn').addEventListener('click', advance);
document.getElementById('retake-btn').addEventListener('click', startQuiz);
document.getElementById('share-btn').addEventListener('click', shareScore);

// Boot
initLanding();
</script>
